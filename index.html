<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEI — Plano Educacional Individualizado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy-900: #0a1628;
  --navy-800: #0f2140;
  --navy-700: #142d58;
  --blue-600: #1a56db;
  --blue-500: #2563eb;
  --blue-400: #3b82f6;
  --blue-300: #60a5fa;
  --blue-200: #93c5fd;
  --sky-400: #38bdf8;
  --white: #ffffff;
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.1);
  --glass-hover: rgba(255,255,255,0.1);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy-900);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -40%; left: -20%;
  width: 80vw; height: 80vw;
  background: radial-gradient(circle, rgba(37,99,235,0.12) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -30%; right: -15%;
  width: 70vw; height: 70vw;
  background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.app { position: relative; z-index: 1; }

/* ── Navbar ── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,22,40,0.7);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 24px;
  animation: fadeDown 0.5s ease;
}
.navbar-inner {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}
.navbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--text-primary);
}
.navbar-brand .brand-icon {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--blue-600), var(--blue-400));
  display: grid; place-items: center;
  box-shadow: 0 2px 10px rgba(37,99,235,0.3);
}
.navbar-brand .brand-icon svg { width: 18px; height: 18px; color: white; }
.navbar-brand span {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: -0.3px;
}
.navbar-menu {
  display: flex;
  align-items: center;
  gap: 4px;
}
.nav-link {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 0.84rem;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all 0.2s;
  border: 1px solid transparent;
}
.nav-link:hover {
  background: var(--glass);
  color: var(--text-primary);
  border-color: var(--glass-border);
}
.nav-link.active {
  background: rgba(37,99,235,0.12);
  color: var(--blue-300);
  border-color: rgba(59,130,246,0.2);
}
.nav-link svg { width: 16px; height: 16px; }
.nav-link.admin-link {
  background: rgba(234,179,8,0.08);
  border-color: rgba(234,179,8,0.15);
  color: #fbbf24;
}
.nav-link.admin-link:hover {
  background: rgba(234,179,8,0.15);
  color: #fcd34d;
}

/* ── Header ── */
.header {
  padding: 44px 24px 32px;
  text-align: center;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--blue-400), transparent);
}
.header h1 {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1.15;
  background: linear-gradient(135deg, var(--white) 0%, var(--blue-200) 50%, var(--sky-400) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: fadeDown 0.6s ease 0.1s both;
}
.header p {
  margin-top: 12px;
  color: var(--text-secondary);
  font-size: 0.95rem;
  max-width: 520px;
  margin-left: auto; margin-right: auto;
  line-height: 1.6;
  animation: fadeDown 0.6s ease 0.2s both;
}

/* ── Container ── */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 36px 20px 60px;
}

/* ── Section ── */
.section {
  margin-bottom: 44px;
  animation: fadeUp 0.5s ease 0.15s both;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 10px;
}
.section-title {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text-primary);
}
.section-title .icon-circle {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: grid; place-items: center;
  background: linear-gradient(135deg, var(--blue-600), var(--blue-400));
  box-shadow: 0 2px 12px rgba(37,99,235,0.35);
}
.section-title .icon-circle svg { width: 18px; height: 18px; color: white; }

.count-badge {
  background: rgba(37,99,235,0.15);
  border: 1px solid rgba(59,130,246,0.2);
  color: var(--blue-300);
  font-size: 0.72rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 100px;
}

/* ── Glass Card ── */
.glass-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 24px;
  backdrop-filter: blur(20px);
  transition: border-color 0.3s;
}
.glass-card:hover { border-color: rgba(255,255,255,0.15); }

/* ── Teacher Grid ── */
.teacher-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 18px;
}

.teacher-card-view {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 24px 16px 20px;
  text-align: center;
  transition: all 0.3s ease;
  text-decoration: none;
  display: block;
}
.teacher-card-view:hover {
  border-color: var(--blue-400);
  transform: translateY(-4px);
  box-shadow: 0 12px 36px rgba(37,99,235,0.2);
  background: var(--glass-hover);
}

.teacher-card-view .avatar {
  width: 96px; height: 96px;
  border-radius: 50%;
  margin: 0 auto 14px;
  overflow: hidden;
  border: 2.5px solid var(--blue-400);
  box-shadow: 0 0 0 5px rgba(59,130,246,0.1);
  background: var(--navy-700);
  display: grid; place-items: center;
}
.teacher-card-view .avatar img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.teacher-card-view .avatar .no-photo { color: var(--text-muted); }
.teacher-card-view .avatar .no-photo svg { width: 38px; height: 38px; }

.teacher-card-view .t-name {
  font-family: 'Outfit', sans-serif;
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--text-primary);
  word-break: break-word;
  margin-bottom: 6px;
}
.teacher-card-view .t-link-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.7rem;
  color: var(--blue-300);
  font-weight: 500;
  background: rgba(37,99,235,0.1);
  padding: 3px 10px;
  border-radius: 100px;
}
.teacher-card-view .t-link-tag svg { width: 11px; height: 11px; }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 0.88rem;
}
.empty-state svg {
  width: 48px; height: 48px;
  margin-bottom: 14px;
  opacity: 0.3;
}
.empty-state p { font-size: 0.84rem; margin-top: 4px; }

/* ── Animations ── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .teacher-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
  .glass-card { padding: 18px; }
  .navbar-brand span { display: none; }
}
</style>
</head>
<body>
<div class="app">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 4 3 6 3s6-1 6-3v-5"/></svg>
        </div>
        <span>PEI</span>
      </a>
      <div class="navbar-menu">
        <a href="index.html" class="nav-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Início
        </a>
        <a href="admin.html" class="nav-link admin-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Admin
        </a>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <header class="header">
    <h1>Plano Educacional<br>Individualizado — PEI</h1>
    <p>Ferramenta para organização e acompanhamento do plano educacional personalizado dos estudantes.</p>
  </header>

  <div class="container">
    <!-- Professores -->
    <section class="section">
      <div class="section-header">
        <div class="section-title">
          <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          Professores
        </div>
        <span class="count-badge" id="countBadge">0 professores</span>
      </div>
      <div class="glass-card">
        <div class="teacher-grid" id="teacherGrid">
          <div class="empty-state" id="emptyDisplay">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <p>Nenhum professor cadastrado</p>
            <p style="margin-top:8px;font-size:0.78rem;">Acesse o painel <strong style="color:#fbbf24;">Admin</strong> para adicionar.</p>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
function loadTeachers() {
  try {
    return JSON.parse(localStorage.getItem('pei_teachers') || '[]');
  } catch(e) { return []; }
}

function render() {
  const teachers = loadTeachers();
  const grid = document.getElementById('teacherGrid');
  const empty = document.getElementById('emptyDisplay');

  grid.querySelectorAll('.teacher-card-view').forEach(el => el.remove());

  if (teachers.length === 0) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    teachers.forEach((t, i) => {
      const card = document.createElement('a');
      card.className = 'teacher-card-view';
      card.style.animation = 'fadeUp 0.4s ease ' + (i * 0.06) + 's both';
      if (t.link) {
        card.href = t.link;
        card.target = '_blank';
        card.rel = 'noopener';
      } else {
        card.href = 'javascript:void(0)';
        card.style.cursor = 'default';
      }
      card.innerHTML =
        '<div class="avatar">' +
          (t.photo
            ? '<img src="' + t.photo + '" alt="' + t.name + '">'
            : '<div class="no-photo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>') +
        '</div>' +
        '<div class="t-name">' + t.name + '</div>' +
        (t.link
          ? '<span class="t-link-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Acessar perfil</span>'
          : '');
      grid.appendChild(card);
    });
  }

  const n = teachers.length;
  document.getElementById('countBadge').textContent =
    n === 1 ? '1 professor' : n + ' professores';
}

render();
</script>

</body>
</html>
